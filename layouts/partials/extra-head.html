{{- $pubUri := site.Params.standard.publicationUri -}}
{{- with index site.Data "standardSite" -}}
  {{- with .publicationUri -}}
    {{- $pubUri = . -}}
  {{- end -}}
{{- end -}}
{{- with $pubUri }}
<link rel="site.standard.publication" href="{{ . }}" />
{{- end }}
{{- with .Params.standardDocumentUri }}
<link rel="site.standard.document" href="{{ . }}" />
{{- end }}
